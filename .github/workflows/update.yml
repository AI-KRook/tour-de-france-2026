name: Data bijwerken en site publiceren

on:
  push:
    branches: [main]
  schedule:
    # elk kwartier tijdens koersuren in juli (UTC; NL = UTC+2)
    - cron: "*/15 12-19 * 7 *"
    # dagelijkse controle (o.a. nieuwe GPX-routes)
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-en-publiceer
  cancel-in-progress: false

jobs:
  update-en-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        if: github.event_name != 'push'
        with:
          python-version: "3.12"

      - name: Dependencies installeren
        if: github.event_name != 'push'
        run: pip install --quiet requests beautifulsoup4 anthropic

      - uses: actions/setup-node@v4
        if: github.event_name != 'push'
        with:
          node-version: "20"

      - name: Playwright-browser cachen
        if: github.event_name != 'push'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-v1

      - name: Live wedstrijddata vangen (alleen tijdens koersuren)
        if: github.event_name != 'push'
        continue-on-error: true
        run: |
          hu=$(date -u +%H)
          # koersvenster: ruwweg 10:00-18:00 UTC (NL 12:00-20:00)
          if [ "$hu" -ge 10 ] && [ "$hu" -le 18 ]; then
            npm install --no-audit --no-fund --no-save playwright
            npx playwright install --with-deps chromium
            node scripts/capture_live.js
          else
            echo "buiten koersvenster ($hu:00 UTC); vangst overgeslagen"
            rm -f scripts/live_out.json
          fi

      - name: Uitslagen, klassement en dagcommentaar bijwerken
        if: github.event_name != 'push'
        env:
          # optioneel repo-secret; zonder sleutel valt het dagcommentaar
          # terug op een vast tekstpatroon
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/update_stand.py
        continue-on-error: true

      - name: Wijzigingen committen
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --cached --quiet; then
            git commit -m "Data-update $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase origin main || true
            git push origin main
          fi

      # GitHub Pages serveert de gh-pages-branch; die spiegelen we hier.
      - name: Publiceren naar GitHub Pages (gh-pages)
        run: git push origin HEAD:gh-pages --force
