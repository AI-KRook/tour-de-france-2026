name: Diagnose fotobron

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/diagnose.yml"]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rennerfoto's testen (hotlink-gedrag)
        run: |
          mkdir -p diagnose
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          url=$(python3 -c "import json;d=json.load(open('data/renners.json'));print(next(iter(d.values()))['foto'])")
          echo "test-url: $url" | tee diagnose/foto.txt
          echo "== zonder referer ==" | tee -a diagnose/foto.txt
          curl -sS -A "$UA" -o /tmp/a -D - -w "HTTP %{http_code} type=%{content_type} bytes=%{size_download}\n" --max-time 20 "$url" | grep -iE "^HTTP|content-type|access-control|^HTTP/|%{|HTTP " | tee -a diagnose/foto.txt || true
          echo "== met referer github.io ==" | tee -a diagnose/foto.txt
          curl -sS -A "$UA" -e "https://ai-krook.github.io/" -o /tmp/b -w "HTTP %{http_code} type=%{content_type} bytes=%{size_download}\n" --max-time 20 "$url" | tee -a diagnose/foto.txt || true
          echo "== met referer letour ==" | tee -a diagnose/foto.txt
          curl -sS -A "$UA" -e "https://www.letour.fr/" -o /tmp/c -w "HTTP %{http_code} type=%{content_type} bytes=%{size_download}\n" --max-time 20 "$url" | tee -a diagnose/foto.txt || true
          cat diagnose/foto.txt

      - name: Resultaat naar diagnose-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diag-tmp
          git rm -rf --cached . >/dev/null
          git add -f diagnose/
          git commit -m "Diagnose fotobron $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push origin HEAD:diagnose-data --force
