name: Diagnose uitslagbron

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/diagnose.yml"]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: rankingType-2026-7 per type dumpen (top 3 met namen)
        run: |
          mkdir -p diagnose
          npm install --no-audit --no-fund --no-save playwright
          npx playwright install --with-deps chromium
          cat > diag.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            let rank = null, comp = null;
            page.on('response', async (r) => {
              const u = r.url();
              try {
                if (/\/api\/rankingType-2026-7\b/.test(u)) rank = await r.json();
                else if (u.includes('/api/allCompetitors-2026')) comp = await r.json();
              } catch (e) {}
            });
            await page.goto('https://racecenter.letour.fr/nl', { waitUntil: 'networkidle', timeout: 60000 }).catch(()=>{});
            await page.waitForTimeout(20000);
            await browser.close();
            const byhash = {}, bybib = {};
            for (const c of comp || []) { if (c._id) byhash[c._id] = c; if (c.bib!=null) bybib[c.bib]=c; }
            const naam = (r) => { const h=(r.$rider||'').split(':').pop(); const c=byhash[h]||bybib[r.bib]; return c?`${c.firstname} ${c.lastname}`:('bib'+r.bib); };
            const out = [];
            for (const it of rank || []) {
              const rk = it.rankings;
              if (!Array.isArray(rk) || !rk.length) continue;
              const top = rk.filter(x=>(x.position||0)>=1).sort((a,b)=>a.position-b.position).slice(0,3);
              out.push(`type=${it.type} n=${rk.length} :: ` + top.map(x=>`${x.position}.${naam(x)}`).join(' | '));
            }
            fs.writeFileSync('diagnose/ranking7.txt', (out.join('\n') || 'GEEN rankingType-2026-7 gevangen') + '\n');
            console.log(out.join('\n'));
          })();
          EOF
          node diag.js || true
          cat diagnose/ranking7.txt || true

      - name: Resultaat naar diagnose-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diag-tmp
          git rm -rf --cached . >/dev/null
          git add -f diagnose/
          git commit -m "Diagnose uitslagbron $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push origin HEAD:diagnose-data --force
