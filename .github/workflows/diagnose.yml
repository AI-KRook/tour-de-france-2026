name: Diagnose databronnen
on: workflow_dispatch
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Wikipedia-pagina's ophalen
        run: |
          mkdir -p /tmp/wiki
          UA="TdF-Routeverkenner/1.0 (contact via github)"
          curl -s --max-time 30 -A "$UA" -o /tmp/wiki/hoofd.html "https://en.wikipedia.org/wiki/2026_Tour_de_France"
          curl -s --max-time 30 -A "$UA" -o /tmp/wiki/etappes-1-11.html "https://en.wikipedia.org/wiki/2026_Tour_de_France,_Stage_1_to_Stage_11"
          curl -s --max-time 30 -A "$UA" -o /tmp/wiki/etappes-12-21.html -w "stage12-21: %{http_code}\n" "https://en.wikipedia.org/wiki/2026_Tour_de_France,_Stage_12_to_Stage_21" || true
          ls -la /tmp/wiki
      - uses: actions/upload-artifact@v4
        with:
          name: wiki-html
          path: /tmp/wiki/
