name: Diagnose livebron

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/diagnose.yml"]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: livetracking.json ophalen
        run: |
          mkdir -p diagnose
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          curl -sS -A "$UA" --max-time 20 -L "https://racecenter.letour.fr/livetracking.json" -o diagnose/livetracking.json
          wc -c diagnose/livetracking.json

      - name: Resultaat naar diagnose-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diag-tmp
          git rm -rf --cached . >/dev/null
          git add -f diagnose/
          git commit -m "Diagnose bron-zoektocht $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push origin HEAD:diagnose-data --force
