name: Diagnose livebron

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/diagnose.yml"]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Netwerkverkeer van racecenter vastleggen
        run: |
          mkdir -p diagnose /tmp/vang
          npm init -y >/dev/null 2>&1
          npm install --no-audit --no-fund playwright
          npx playwright install --with-deps chromium 2>&1 | tail -3
          cat > vang.js <<'EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const urls = new Set();
            let teller = 0;
            page.on('response', async (r) => {
              const url = r.url();
              const ct = (r.headers()['content-type'] || '');
              urls.add(`${r.status()} ${ct.split(';')[0]} ${url}`);
              if ((ct.includes('json') || ct.includes('event-stream')) && !url.includes('google') && !url.includes('xiti')) {
                try {
                  const body = await r.text();
                  const naam = `/tmp/vang/${String(++teller).padStart(2,'0')}-${url.replace(/[^a-z0-9]+/gi,'_').slice(0,90)}.txt`;
                  fs.writeFileSync(naam, url + '\n\n' + body.slice(0, 250000));
                } catch (e) {}
              }
            });
            await page.goto('https://racecenter.letour.fr/nl', { waitUntil: 'networkidle', timeout: 60000 }).catch(()=>{});
            await page.waitForTimeout(20000);
            fs.writeFileSync('/tmp/vang/00-urls.txt', [...urls].sort().join('\n'));
            await browser.close();
          })();
          EOF
          node vang.js
          cp /tmp/vang/* diagnose/ 2>/dev/null || true
          ls -la diagnose/ | head -40

      - name: Resultaat naar diagnose-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan diag-tmp
          git rm -rf --cached . >/dev/null
          git add -f diagnose/
          git commit -m "Diagnose bron-zoektocht $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push origin HEAD:diagnose-data --force
